# Hibernate: em dev/test deixamos 'validate' para que o schema seja gerenciado pelo Flyway;
# em produção usamos 'validate' também para nunca mexer no schema em runtime.
%dev.quarkus.hibernate-orm.database.generation=validate
%test.quarkus.hibernate-orm.database.generation=validate
%prod.quarkus.hibernate-orm.database.generation=validate

# import.sql roda apenas em dev (dados de seed); em prod é desabilitado.
%dev.quarkus.hibernate-orm.sql-load-script=import.sql
%prod.quarkus.hibernate-orm.sql-load-script=no-file

# Flyway: executa migrações no startup em todos os perfis.
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.locations=classpath:db/migration

%dev.quarkus.datasource.db-kind=mariadb
%dev.quarkus.datasource.username=root
%dev.quarkus.datasource.password=123456
%dev.quarkus.datasource.jdbc.url=jdbc:mariadb://localhost:3306/local_acessdb
%dev.quarkus.datasource.jdbc.driver=org.mariadb.jdbc.Driver

# echeduler permite ter endpoints periodicos
quarkus.scheduler.enabled=true

mp.jwt.verify.publickey.location=token/publicKey.pem
mp.jwt.verify.issuer=jwt-kamcdo
smallrye.jwt.sign.key.location=token/privateKey.pem

# Bootstrap do primeiro SUPER_ADMIN (atividade 002).
# Criado apenas se NÃO existir nenhum SUPER_ADMIN no banco na subida do app.
# Em produção, substitua a senha padrão logo após o primeiro login.
bootstrap.super-admin.email=admin@local-acess.local
bootstrap.super-admin.senha=admin123
bootstrap.super-admin.cpf=00000000000
bootstrap.super-admin.nome=Super Admin

# MinIO / Storage (atividade 022).
# Credenciais abaixo são para dev apenas; em produção, forneça via variáveis de ambiente
# (QUARKUS_MINIO_URL, QUARKUS_MINIO_ACCESS_KEY, QUARKUS_MINIO_SECRET_KEY).
quarkus.minio.url=http://localhost:9000
quarkus.minio.access-key=minioadmin
quarkus.minio.secret-key=minioadmin

storage.bucket.credenciais-foto=credenciais-foto
storage.bucket.documentos=documentos
storage.bucket.capturas-acesso=capturas-acesso
storage.presigned-url-ttl-seconds=300
storage.max-file-size-bytes=5242880
storage.tipos-permitidos-imagem=image/jpeg,image/png,image/webp

# Logs estruturados (atividade 050).
# Em produção os logs saem em JSON para serem indexados; em dev, console legível.
# O formato inclui MDC (requestId, empresaId, usuarioId) para correlação por request.
%prod.quarkus.log.console.json=true
%dev.quarkus.log.console.json=false
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) [%X{requestId},%X{empresaId},%X{usuarioId}] %s%e%n

# OpenAPI / Swagger UI (atividade 052).
# Contrato exposto em /openapi (JSON) e /openapi?format=yaml. Rotas versionadas sob /api/v1.
quarkus.smallrye-openapi.path=/openapi
quarkus.smallrye-openapi.info-title=local_acess API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=API de controle de acesso a eventos e locais
%dev.quarkus.swagger-ui.always-include=true
%dev.quarkus.swagger-ui.path=/swagger-ui

# Notificações (atividade 032).
# Remetente padrão dos emails. Em prod sobrescrever via NOTIFICACAO_EMAIL_FROM.
notificacao.email.from=noreply@local-acess.local
# Buffer de mensagens pendentes por sessão websocket (sessões lentas).
# 100 é conservador — basta para bursts do painel.
notificacao.websocket.max-mensagens-buffer=100
# Em dev o mailer é mockado (não envia para rede); conteúdo vai ao MockMailbox
# e ao log. Em prod, configurar quarkus.mailer.host/port/username/password
# via env vars.
%dev.quarkus.mailer.mock=true
quarkus.mailer.from=noreply@local-acess.local

# Frigate / validação facial (atividade 021).
# URL base da instância do Frigate. Em produção, via env var.
# Cliente HTTP é o do JDK (FrigateServiceImpl), não o rest-client do Quarkus.
frigate.url=http://localhost:5000
# Token opcional (Bearer) — vazio desativa o header Authorization.
frigate.token=
# Timeouts do cliente HTTP do JDK usado em FrigateServiceImpl.
# Conexão curta para detectar indisponibilidade rápido; read mais folgado
# porque o Frigate pode demorar 1-2s para processar a imagem.
frigate.timeout-connect-ms=3000
frigate.timeout-read-ms=10000
# Score mínimo (0..1) para considerar match AUTORIZADO.
frigate.similaridade-minima=0.85
# Política quando o Frigate cair: permitir | pendente | negar.
# Default 'pendente' = retorna PENDENTE para o aparelho; gestor decide.
frigate.fallback=pendente
