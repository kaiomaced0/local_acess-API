# Configuração exclusiva dos testes de integração (atividade 051).
#
# Banco real via Quarkus Dev Services (Testcontainers): como o profile de teste
# NÃO define quarkus.datasource.jdbc.url, o Quarkus sobe sozinho um container
# Postgres e roda as migrações Flyway (migrate-at-start herdado do
# application.properties principal). hibernate-orm.database.generation=validate
# (também herdado, %test) garante de quebra que as entidades batem com o schema
# migrado.
#
# Por que Postgres e não MariaDB: as migrações V1..V15 usam "GENERATED BY DEFAULT
# AS IDENTITY", sintaxe SQL-standard que o Postgres aceita e o MariaDB não.
quarkus.datasource.db-kind=postgresql
quarkus.datasource.devservices.image-name=postgres:16-alpine

# O workflow de pendências dispara notificações por e-mail. Em teste o mailer é
# mockado — nada vai para a rede (cai no MockMailbox/log).
quarkus.mailer.mock=true
