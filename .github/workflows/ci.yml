name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    name: Build e testes de integração
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configura JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      # Os testes @QuarkusTest sobem um MariaDB via Dev Services (Testcontainers).
      # Os runners ubuntu-latest já têm Docker disponível.
      - name: Testes
        run: ./mvnw -B -ntp test
